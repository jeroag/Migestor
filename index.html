<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Mi Gestor Financiero</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>💸 Mi Gestor Financiero</h1>

      <!-- RESUMEN / BALANCE -->
      <div class="resumen">
        <div class="resumen-item ingresos-total">
          <span>Total Ingresos</span>
          <strong id="total-ingresos">$0.00</strong>
        </div>
        <div class="resumen-item gastos-total">
          <span>Total Gastos</span>
          <strong id="total-gastos">$0.00</strong>
        </div>
        <div class="resumen-item balance">
          <span>Balance</span>
          <strong id="balance">$0.00</strong>
        </div>
      </div>

      <!-- PESTAÑAS -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('gastos')">💸 Gastos</button>
        <button class="tab-btn" onclick="switchTab('ingresos')">💰 Ingresos</button>
        <button class="tab-btn" onclick="switchTab('metas')">🎯 Metas</button>
        <button class="tab-btn" onclick="switchTab('graficos')">📊 Gráficos</button>
      </div>

      <!-- PESTAÑA GASTOS -->
      <div id="tab-gastos" class="tab-content active">
        <form id="expense-form">
          <input type="text" id="desc" placeholder="¿En qué gastaste?" required />
          <input type="number" id="amount" placeholder="Monto ($)" step="0.01" min="0.01" required />
          <select id="cat">
            <option value="Comida">🍕 Comida</option>
            <option value="Transporte">🚗 Transporte</option>
            <option value="Ocio">🎬 Ocio</option>
            <option value="Renta">🏠 Renta</option>
            <option value="Salud">💊 Salud</option>
            <option value="Educación">📚 Educación</option>
            <option value="Ropa">👗 Ropa</option>
            <option value="Suscripciones">📱 Suscripciones</option>
            <option value="Otros">📦 Otros</option>
          </select>
          <button type="submit">➕ Añadir Gasto</button>
        </form>
        <div id="lista-gastos">
          <h2>Movimientos Recientes</h2>
          <ul id="expenses-list"></ul>
        </div>
      </div>

      <!-- PESTAÑA INGRESOS -->
      <div id="tab-ingresos" class="tab-content">
        <form id="income-form">
          <input type="text" id="inc-desc" placeholder="¿De dónde viene el ingreso?" required />
          <input type="number" id="inc-amount" placeholder="Monto ($)" step="0.01" min="0.01" required />
          <select id="inc-cat">
            <option value="Salario">💼 Salario</option>
            <option value="Freelance">💻 Freelance</option>
            <option value="Inversión">📈 Inversión</option>
            <option value="Regalo">🎁 Regalo</option>
            <option value="Bono">🏆 Bono</option>
            <option value="Alquiler">🏠 Alquiler</option>
            <option value="Otros">📦 Otros</option>
          </select>
          <button type="submit">➕ Añadir Ingreso</button>
        </form>
        <div id="lista-ingresos">
          <h2>Ingresos Recientes</h2>
          <ul id="income-list"></ul>
        </div>
      </div>

      <!-- PESTAÑA METAS DE AHORRO -->
      <div id="tab-metas" class="tab-content">
        <form id="meta-form">
          <input type="text" id="meta-nombre" placeholder="Nombre de la meta (ej: Vacaciones)" required />
          <input type="number" id="meta-objetivo" placeholder="Objetivo ($)" step="0.01" min="1" required />
          <input type="number" id="meta-inicial" placeholder="Ya tengo ahorrado ($) — opcional" step="0.01" min="0" />
          <button type="submit">🎯 Crear Meta</button>
        </form>
        <div id="lista-metas">
          <h2>Mis Metas de Ahorro</h2>
          <div id="metas-list"></div>
        </div>
      </div>

      <!-- PESTAÑA GRÁFICOS -->
      <div id="tab-graficos" class="tab-content">
        <h2>📊 Resumen Visual</h2>

        <div class="chart-section">
          <h3>Gastos por Categoría</h3>
          <div class="chart-container">
            <canvas id="chart-gastos-cat"></canvas>
          </div>
        </div>

        <div class="chart-section">
          <h3>Ingresos por Categoría</h3>
          <div class="chart-container">
            <canvas id="chart-ingresos-cat"></canvas>
          </div>
        </div>

        <div class="chart-section">
          <h3>Evolución Mensual</h3>
          <div class="chart-container chart-container--tall">
            <canvas id="chart-evolucion"></canvas>
          </div>
        </div>

        <button class="btn-refresh" onclick="loadGraficos()">🔄 Actualizar gráficos</button>
      </div>

    </div>

    <!-- MODAL DE CONFIRMACIÓN -->
    <div id="modal-overlay" class="modal-overlay" onclick="modalCancel()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <p id="modal-msg" class="modal-msg">¿Estás seguro?</p>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" onclick="modalCancel()">Cancelar</button>
          <button type="button" id="modal-confirm" onclick="modalConfirm()">Eliminar</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
